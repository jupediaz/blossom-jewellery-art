[build]
builder = "nixpacks"
buildCommand = "(DATABASE_URL='postgresql://placeholder:placeholder@localhost:5432/placeholder' npx prisma generate) && npm run build"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
startCommand = "cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
